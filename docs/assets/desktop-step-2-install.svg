<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-labelledby="title desc">
  <title id="title">执行安装命令</title>
  <desc id="desc">在终端里粘贴一行安装命令并回车。</desc>
  <rect width="920" height="390" fill="#f6f8fa"/>
  <rect x="70" y="46" width="780" height="298" rx="18" fill="#0d1117"/>
  <circle cx="105" cy="78" r="8" fill="#ff5f57"/>
  <circle cx="130" cy="78" r="8" fill="#ffbd2e"/>
  <circle cx="155" cy="78" r="8" fill="#28c840"/>
  <text x="100" y="126" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="700" fill="#ffffff">图 2：复制安装命令并回车</text>
  <rect x="100" y="154" width="720" height="92" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="122" y="190" font-family="Menlo,Consolas,monospace" font-size="18" fill="#a5d6ff">/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/...</text>
  <text x="122" y="222" font-family="Menlo,Consolas,monospace" font-size="18" fill="#a5d6ff">claude-code-safe-launcher/main/scripts/install.sh)"</text>
  <text x="100" y="284" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#c9d1d9">看到安装完成提示后，就可以去 Finder 找 Claude Safe.app。</text>
</svg>
