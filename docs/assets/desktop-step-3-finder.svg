<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">找到 Claude Safe.app</title>
  <desc id="desc">在用户目录的 Applications 文件夹里找到 Claude Safe.app。</desc>
  <rect width="920" height="420" fill="#f6f8fa"/>
  <rect x="70" y="44" width="780" height="326" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="100" y="92" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#24292f">图 3：Finder 中找到 Claude Safe.app</text>
  <rect x="100" y="118" width="210" height="218" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="124" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#57606a">个人</text>
  <text x="124" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#0969da">Applications</text>
  <text x="124" y="238" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#57606a">Downloads</text>
  <text x="124" y="278" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#57606a">Desktop</text>
  <rect x="350" y="132" width="160" height="142" rx="16" fill="#fff8c5" stroke="#d4a72c"/>
  <circle cx="430" cy="178" r="32" fill="#d97706"/>
  <text x="406" y="188" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#ffffff">C</text>
  <text x="374" y="238" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#24292f">Claude Safe.app</text>
  <text x="100" y="344" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#24292f">路径：~/Applications/Claude Safe.app</text>
</svg>
