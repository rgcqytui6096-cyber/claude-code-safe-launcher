<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">替换 Dock 图标</title>
  <desc id="desc">从 Dock 移除原版 Claude 图标，把 Claude Safe.app 拖到 Dock。</desc>
  <rect width="920" height="360" fill="#f6f8fa"/>
  <rect x="70" y="44" width="780" height="266" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="100" y="92" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#24292f">图 5：Dock 只保留 Claude Safe.app</text>
  <rect x="160" y="138" width="600" height="96" rx="28" fill="#eaeef2" stroke="#d0d7de"/>
  <circle cx="230" cy="186" r="30" fill="#d0d7de"/>
  <text x="214" y="196" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#57606a">旧</text>
  <text x="274" y="193" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cf222e">移除原 Claude</text>
  <path d="M450 186H540" stroke="#57606a" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="610" cy="186" r="30" fill="#d97706"/>
  <text x="590" y="196" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#ffffff">C</text>
  <text x="650" y="193" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#1a7f37">放入 Safe</text>
  <text x="100" y="274" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" fill="#24292f">以后从 Dock 启动时，实际点击的是安全入口。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
  </defs>
</svg>
