<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">打开终端</title>
  <desc id="desc">macOS 上通过 Spotlight 搜索 Terminal 打开终端。</desc>
  <rect width="920" height="360" fill="#f6f8fa"/>
  <rect x="70" y="46" width="780" height="268" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="100" y="94" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#24292f">图 1：打开“终端”</text>
  <rect x="130" y="128" width="660" height="58" rx="16" fill="#f0f3f6" stroke="#d0d7de"/>
  <text x="160" y="166" font-family="Menlo,Consolas,monospace" font-size="24" fill="#57606a">⌘ + Space</text>
  <text x="100" y="226" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#24292f">输入 Terminal 或“终端”，按回车打开。</text>
  <rect x="100" y="252" width="720" height="34" rx="8" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="116" y="276" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#57606a">只需要打开一次终端完成安装，之后桌面端直接点 Claude Safe.app。</text>
</svg>
