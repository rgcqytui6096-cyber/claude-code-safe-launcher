<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">启动前检查</title>
  <desc id="desc">Claude Safe.app 先检查环境，通过后再打开原版 Claude。</desc>
  <rect width="920" height="380" fill="#f6f8fa"/>
  <rect x="70" y="44" width="780" height="286" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="100" y="92" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#24292f">图 4：先检查，再启动</text>
  <rect x="110" y="132" width="190" height="86" rx="16" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="138" y="168" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#24292f">Claude Safe.app</text>
  <text x="152" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#57606a">安全入口</text>
  <path d="M320 175H430" stroke="#57606a" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="450" y="132" width="170" height="86" rx="16" fill="#ddf4ff" stroke="#54aeef"/>
  <text x="488" y="168" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#24292f">环境检查</text>
  <text x="496" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#57606a">失败就拦截</text>
  <path d="M640 175H740" stroke="#57606a" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="748" y="132" width="72" height="86" rx="16" fill="#dafbe1" stroke="#2da44e"/>
  <text x="770" y="168" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#24292f">Claude</text>
  <text x="758" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#57606a">原 App</text>
  <text x="110" y="270" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" fill="#24292f">检查项：ANTHROPIC_BASE_URL / ANTHROPIC_AUTH_TOKEN / ANTHROPIC_API_KEY</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
  </defs>
</svg>
